<nav
  class="agri-navbar"
  [ngStyle]="{ background: selectedColor || 'linear-gradient(120deg, #22c55e 0%, #16a34a 100%)' }"
>
  <div class="agri-navbar__inner">
    <div class="agri-navbar__row agri-navbar__row--primary">
      <div class="agri-navbar__left">
        <button
          type="button"
          class="menu-toggle"
          [class.is-active]="sidebarActive"
          (click)="toggleSidebar()"
          aria-label="Open sidebar"
        >
          <i class="bi bi-list"></i>
        </button>

        <a routerLink="/" class="brand-link" aria-label="Go to home">
          <img src="images/logo.jpg" alt="AgriMandi logo" class="brand-logo" />
          <span class="brand-name">AgriMandi</span>
        </a>
      </div>

      <div class="agri-navbar__center">
        <form class="search-form search-form--desktop" (submit)="submitSearch()">
          <div class="search-shell" [class.is-open]="searchOpen">
            <i class="bi bi-search search-icon" aria-hidden="true"></i>
            <input
              type="text"
              name="globalSearchDesktop"
              [(ngModel)]="searchQuery"
              class="search-input"
              placeholder="Search products, farmers, buyers..."
              autocomplete="off"
              aria-label="Global search"
              aria-autocomplete="list"
              [attr.aria-expanded]="searchOpen"
              aria-controls="global-search-list"
              [attr.aria-activedescendant]="highlightedSuggestionIndex >= 0 ? getSuggestionId(highlightedSuggestionIndex) : null"
              (focus)="openSearchDropdown()"
              (input)="onSearchInputChange(searchQuery)"
              (keydown)="onSearchKeydown($event)"
            />

            <button
              *ngIf="searchQuery"
              type="button"
              class="search-clear"
              (click)="clearSearch()"
              aria-label="Clear search"
            >
              <i class="bi bi-x-circle"></i>
            </button>

            <ul
              *ngIf="searchOpen"
              id="global-search-list"
              class="search-suggestions"
              role="listbox"
            >
              <li
                *ngFor="let item of searchSuggestions; let i = index"
                [id]="getSuggestionId(i)"
                class="search-suggestion-item"
                [class.is-active]="i === highlightedSuggestionIndex"
                role="option"
                [attr.aria-selected]="i === highlightedSuggestionIndex"
                (mousedown)="selectSuggestion(item)"
              >
                <span class="suggestion-main">
                  <i class="bi" [ngClass]="item.icon" aria-hidden="true"></i>
                  {{ item.label }}
                </span>
                <span class="suggestion-type">{{ item.type }}</span>
              </li>

              <li *ngIf="searchSuggestions.length === 0" class="search-empty">
                No matching results found
              </li>
            </ul>
          </div>
        </form>
      </div>

      <div class="agri-navbar__right">
        <div class="notification-dropdown" *ngIf="isLoggedIn">
          <button
            type="button"
            class="icon-btn"
            (click)="toggleNotificationMenu()"
            aria-label="Open notifications"
            [attr.aria-expanded]="showNotificationMenu"
          >
            <i class="bi bi-bell-fill" aria-hidden="true"></i>
            <span *ngIf="notificationCount > 0" class="notification-badge">{{ notificationCount }}</span>
          </button>

          <div *ngIf="showNotificationMenu" class="dropdown-panel notification-panel">
            <div class="dropdown-header">Recent Notifications</div>
            <div *ngIf="visibleNotifications.length === 0" class="dropdown-empty">No new notifications</div>
            <button
              type="button"
              *ngFor="let notification of visibleNotifications"
              class="dropdown-item"
            >
              <i class="bi bi-dot" aria-hidden="true"></i>
              <span>{{ notification }}</span>
            </button>
          </div>
        </div>

        <ng-container *ngIf="isLoggedIn; else authButtons">
          <div class="user-dropdown">
            <button
              type="button"
              class="profile-btn"
              (click)="toggleUserMenu()"
              aria-label="Open user profile menu"
              [attr.aria-expanded]="showUserMenu"
            >
              <img [src]="profileImageUrl || defaultProfileImage" alt="User avatar" class="profile-avatar" />
              <span class="profile-name">{{ username || 'User' }}</span>
              <i class="bi bi-chevron-down profile-arrow" aria-hidden="true"></i>
            </button>

            <div *ngIf="showUserMenu" class="dropdown-panel profile-panel">
              <button
                type="button"
                *ngFor="let item of profileMenuItems"
                class="dropdown-item"
                [class.dropdown-item--danger]="item.class === 'danger'"
                [hidden]="!item.showIf()"
                (click)="onProfileMenuSelect(item, $event)"
              >
                <i class="bi" [ngClass]="item.icon" aria-hidden="true"></i>
                <span>{{ item.label }}</span>
              </button>
            </div>
          </div>
        </ng-container>

        <ng-template #authButtons>
          <div class="auth-actions">
            <a routerLink="/auth/login" class="btn btn--ghost">Login</a>
            <a routerLink="/auth/signup" class="btn btn--solid">Sign Up</a>
          </div>
        </ng-template>
      </div>
    </div>

    <div class="agri-navbar__row agri-navbar__row--mobile-search">
      <form class="search-form" (submit)="submitSearch()">
        <div class="search-shell" [class.is-open]="searchOpen">
          <i class="bi bi-search search-icon" aria-hidden="true"></i>
          <input
            type="text"
            name="globalSearchMobile"
            [(ngModel)]="searchQuery"
            class="search-input"
            placeholder="Search products, farmers, buyers..."
            autocomplete="off"
            aria-label="Global search"
            aria-autocomplete="list"
            [attr.aria-expanded]="searchOpen"
            aria-controls="global-search-list"
            [attr.aria-activedescendant]="highlightedSuggestionIndex >= 0 ? getSuggestionId(highlightedSuggestionIndex) : null"
            (focus)="openSearchDropdown()"
            (input)="onSearchInputChange(searchQuery)"
            (keydown)="onSearchKeydown($event)"
          />

          <button
            *ngIf="searchQuery"
            type="button"
            class="search-clear"
            (click)="clearSearch()"
            aria-label="Clear search"
          >
            <i class="bi bi-x-circle"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</nav>
