<section class="dashboard-shell">
  <div *ngIf="loading" class="status loading">Preparing mandi insights...</div>

  <div *ngIf="!loading && !hasData" class="status empty">
    Dashboard insights will appear after mandi records are loaded.
  </div>

  <ng-container *ngIf="!loading && hasData && dashboard">
    <div class="tab-shell">
      <nav class="tab-row" aria-label="Dashboard Tabs">
        <button
          type="button"
          *ngFor="let tab of tabs"
          class="tab-btn"
          [class.active]="activeTab === tab.id"
          (click)="setActiveTab(tab.id)"
        >
          {{ tab.label }}
        </button>
      </nav>
    </div>

    <app-price-summary-cards [kpis]="dashboard.kpis" [windowAverages]="dashboard.windowAverages"></app-price-summary-cards>

    <div class="chart-grid" *ngIf="activeTab === 'overview' || activeTab === 'trend' || activeTab === 'markets'">
      <app-crop-price-trend *ngIf="activeTab === 'overview' || activeTab === 'trend'" [points]="dashboard.priceTrend"></app-crop-price-trend>
      <app-market-comparison
        *ngIf="activeTab === 'overview' || activeTab === 'markets'"
        [markets]="dashboard.marketComparison"
      ></app-market-comparison>
    </div>

    <div class="chart-grid bottom" *ngIf="activeTab === 'overview' || activeTab === 'demand' || activeTab === 'crops'">
      <app-demand-supply-chart
        *ngIf="activeTab === 'overview' || activeTab === 'demand'"
        [items]="dashboard.demandSupply"
        [indicator]="demandIndicator"
      ></app-demand-supply-chart>
      <app-top-crops
        *ngIf="activeTab === 'overview' || activeTab === 'crops'"
        [topCrops]="dashboard.topCrops"
        [distribution]="dashboard.cropDistribution"
        [highest]="dashboard.highestPriceCrop"
        [lowest]="dashboard.lowestPriceCrop"
      ></app-top-crops>
    </div>

    <app-market-insights
      *ngIf="activeTab === 'insights'"
      [dailyPriceChanges]="dashboard.dailyPriceChanges"
      [bestMandis]="dashboard.bestMandis"
      [districtHeatmap]="dashboard.districtHeatmap"
      [priceStability]="dashboard.priceStability"
      [weeklyMovement]="dashboard.weeklyMovement"
      [arrivalPriceInsight]="dashboard.arrivalPriceInsight"
    ></app-market-insights>
  </ng-container>
</section>
